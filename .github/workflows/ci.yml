name: PayMatrix CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    name: Build & Verify Backend
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Typecheck & Build
      run: npm run build

  build-frontend:
    name: Build & Verify Frontend
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install

    - name: Next.js Build
      run: npm run build
      env:
        # Providing a mock URL so the Next.js static builder doesn't crash if it looks for it
        NEXT_PUBLIC_API_URL: http://localhost:3001
